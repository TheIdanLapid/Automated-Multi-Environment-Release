name: Continuous Deployment

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-app:${{ github.event.release.tag_name }} .

      - name: Simulate Deployment to Staging
        run: |
          echo "Deploying version ${{ github.event.release.tag_name }} to Staging environment..."
          sleep 5
          echo "Deployment to Staging successful."

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate Deployment to Production
        run: |
          echo "Deploying version ${{ github.event.release.tag_name }} to Production environment..."
          sleep 5
          echo "Deployment to Production successful."