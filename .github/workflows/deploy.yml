name: Continuous Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      rollback_version:
        description: 'Version tag to rollback to (e.g., v0.3.0)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine Target Tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.rollback_version }}" ]; then
            echo "TARGET_TAG=${{ github.event.inputs.rollback_version }}" >> $GITHUB_ENV
          else
            echo "TARGET_TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          TAG="${{ env.TARGET_TAG }}"
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${LOWERCASE_REPO}"
          
          docker build -t ${IMAGE_NAME}:${TAG:-latest} .
          docker push ${IMAGE_NAME}:${TAG:-latest}

      - name: Run Smoke Test on Staging Artifact
        run: |
          TAG="${{ env.TARGET_TAG }}"
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${LOWERCASE_REPO}"
          
          docker run -d -p 8000:8000 --name staging-test-app ${IMAGE_NAME}:${TAG:-latest}
          sleep 5
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          docker rm -f staging-test-app
          
          if [ "$STATUS_CODE" -eq 200 ]; then
            exit 0
          else
            exit 1
          fi

      # This step triggers only if any previous step in this job fails
      - name: Notify Slack on Staging Failure
        if: failure()
        run: |
          echo "Sending Failure Notification..."
          # In a real environment, you would use:
          # curl -X POST -H 'Content-type: application/json' --data '{"text":"❌ Staging Deployment Failed!"}' ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Simulate Pull and Production Deployment
        run: |
          TAG="${{ github.event.inputs.rollback_version || github.event.release.tag_name }}"
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${LOWERCASE_REPO}"
          
          echo "Pulling verified artifact: docker pull ${IMAGE_NAME}:${TAG:-latest}"
          echo "Promoting artifact to Production environment successful."

      # This step triggers only if the production deployment completes successfully
      - name: Notify Slack on Production Success
        if: success()
        run: |
          echo "Sending Success Notification..."
