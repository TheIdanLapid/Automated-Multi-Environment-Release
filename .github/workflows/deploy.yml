name: Continuous Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      rollback_version:
        description: 'Version tag to rollback to (e.g., v0.3.0)'
        required: false
        default: ''

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine Target Tag
        id: vars
        run: |
          # Priority: Manual input (Rollback), then automated release tag
          if [ -n "${{ github.event.inputs.rollback_version }}" ]; then
            echo "TARGET_TAG=${{ github.event.inputs.rollback_version }}" >> $GITHUB_ENV
            echo "Deployment mode: ROLLBACK to ${{ github.event.inputs.rollback_version }}"
          else
            echo "TARGET_TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
            echo "Deployment mode: STANDARD RELEASE of ${{ github.event.release.tag_name }}"
          fi

      - name: Build Docker Image
        run: |
          # If both values are empty (manual trigger without input), fallback to latest
          TAG="${{ env.TARGET_TAG }}"
          docker build -t my-app:${TAG:-latest} .

      - name: Simulate Deployment to Staging
        run: |
          echo "Deploying version ${{ env.TARGET_TAG }} to Staging..."
          sleep 3

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate Deployment to Production
        run: |
          # Retrieve the tag from inputs, release context, or fallback to latest
          TAG="${{ github.event.inputs.rollback_version || github.event.release.tag_name }}"
          echo "Deploying version ${TAG:-latest} to Production environment..."
          sleep 3