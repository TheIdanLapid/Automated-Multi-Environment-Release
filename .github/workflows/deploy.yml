name: Continuous Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      rollback_version:
        description: 'Version tag to rollback to (e.g., v0.3.0)'
        required: false
        default: ''

# Mandate package permissions for GHCR access
permissions:
  contents: read
  packages: write

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine Target Tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.rollback_version }}" ]; then
            echo "TARGET_TAG=${{ github.event.inputs.rollback_version }}" >> $GITHUB_ENV
          else
            echo "TARGET_TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          TAG="${{ env.TARGET_TAG }}"
          # Docker image paths must be lowercase
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${LOWERCASE_REPO}"
          
          echo "Building and pushing ${IMAGE_NAME}:${TAG:-latest}"
          docker build -t ${IMAGE_NAME}:${TAG:-latest} .
          docker push ${IMAGE_NAME}:${TAG:-latest}

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Simulate Pull and Production Deployment
        run: |
          TAG="${{ github.event.inputs.rollback_version || github.event.release.tag_name }}"
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${LOWERCASE_REPO}"
          
          echo "Pulling verified artifact: docker pull ${IMAGE_NAME}:${TAG:-latest}"
          echo "Promoting artifact to Production environment successful."